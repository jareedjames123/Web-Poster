<!DOCTYPE html>
<html>
<head>
    <title>Web Poster</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: grey;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .poster {
            width: 400px;
            background-color: white;
            border: 10px solid #333;
            padding: 30px;
            text-align: center;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }
        h1 {
            color: #d63031;
            font-size: 60px;
            margin: 10px 0;
        }
        h2 {
            color: #2d3436;
            font-size: 24px;
        }
        p {
            font-size: 18px;
            color: #555;
            margin: 15px 0;
        }
        .details {
            background-color:grey ;
            padding: 15px;
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="poster">
    <h2>CORDOVANHON'S</h2>
    <h1>BIG PARTY!</h1>
    <p>Come and enjoy music, food, and fun with us!</p>
    
    <div class="details">
        📅 Date: April 30, 2026<br>
        🕒 Time: 6:00 PM<br>
        📍 Place: Cordova Sports Complex
    </div>
</div>

</body>
</html>
